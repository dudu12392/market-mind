repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: forbid-env-secrets
        name: Forbid .env and API keys in commits
        entry: python scripts/pre_commit_check.py
        language: python
        stages: [commit]
